apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-application
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/datdev2409/argocd-apps.git
    targetRevision: HEAD
    path: apps                # <-- Watches the directory containing the other apps
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: argocd         # <-- Child Application resources live in the argocd namespace
  syncPolicy:
    automated:
      prune: true
      selfHeal: true