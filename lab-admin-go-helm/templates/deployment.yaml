apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: lab-admin-go
  name: lab-admin-go
  namespace: {{.Values.namespace}}
spec:
  replicas: {{.Values.replicaCount}}
  selector:
    matchLabels:
      app: lab-admin-go
  strategy: {}
  template:
    metadata:
      labels:
        app: lab-admin-go
    spec:
      containers:
      - image: "{{.Values.image.repository}}:{{.Values.image.tag}}"
        name: lab-admin-go
        envFrom:
        - configMapRef:
            name: lab-admin-go
status: {}
